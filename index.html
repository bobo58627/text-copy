    <title style="user-select: text !important;">选择性复制工具</title>
    <style style="user-select: text !important;">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            padding: 40px 20px;
            padding-bottom: 80px;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .header {
            margin-bottom: 32px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
        }
        
        .edit-toggle {
            margin-top: 16px;
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        
        .edit-toggle:hover {
            background: #eee;
        }
        
        .edit-toggle.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* 同步状态 */
        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        
        .sync-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ccc;
        }
        
        .sync-dot.synced { background: #10b981; }
        .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
        .sync-dot.error { background: #ef4444; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 全选操作区 */
        .select-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .select-actions button {
            padding: 8px 16px;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        
        .select-actions button:hover {
            background: #eee;
            color: #333;
        }
        
        .paragraph-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .paragraph-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px 20px;
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .paragraph-item:hover {
            border-color: #ccc;
        }
        
        .paragraph-item.selected {
            background: #f0f7ff;
            border-color: #333;
        }
        
        .checkbox-wrapper {
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #333;
        }
        
        .paragraph-content {
            flex: 1;
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .paragraph-textarea {
            flex: 1;
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            border: none;
            background: transparent;
            resize: vertical;
            min-height: 60px;
            outline: none;
            font-family: inherit;
        }
        
        .delete-btn {
            flex-shrink: 0;
            padding: 6px 10px;
            background: transparent;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            color: #999;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .delete-btn:hover {
            background: #fee;
            border-color: #e74c3c;
            color: #e74c3c;
        }
        
        .action-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        
        .copy-btn {
            flex: 1;
            min-width: 200px;
            padding: 16px 32px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .copy-btn:hover {
            background: #333;
            transform: translateY(-1px);
        }
        
        .copy-btn:active {
            transform: translateY(0);
        }
        
        .copy-btn.success {
            background: #10b981;
        }
        
        .add-btn {
            padding: 16px 24px;
            background: #fff;
            color: #1a1a1a;
            border: 2px dashed #ccc;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .add-btn:hover {
            border-color: #1a1a1a;
            background: #fafafa;
        }
        
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .share-section {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        
        .share-label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .share-link {
            display: flex;
            gap: 8px;
        }
        
        .share-link input {
            flex: 1;
            padding: 12px 16px;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            outline: none;
        }
        
        .share-link button {
            padding: 12px 20px;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }
        
        .share-link button:hover {
            background: #eee;
        }
        
        .page-selector {
            margin-bottom: 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .page-tab {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        
        .page-tab:hover {
            background: #eee;
        }
        
        .page-tab.active {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }
        
        .page-tab .delete-page {
            margin-left: 8px;
            opacity: 0.5;
        }
        
        .page-tab .delete-page:hover {
            opacity: 1;
            color: #e74c3c;
        }
        
        .new-page-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px dashed #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #999;
            transition: all 0.2s;
        }
        
        .new-page-btn:hover {
            border-color: #1a1a1a;
            color: #1a1a1a;
        }
        
        .page-title-input {
            padding: 6px 10px;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            width: 100px;
        }
        
        /* 底部编辑区 */
        .footer-section {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 14px 20px;
            z-index: 100;
        }
        
        .footer-content {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .edit-toggle-footer {
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            transition: color 0.2s;
        }
        
        .edit-toggle-footer:hover {
            color: #666;
        }
        
        .edit-toggle-footer.active {
            color: #1a1a1a;
            font-weight: 500;
        }
        
        /* 密码弹窗 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .password-box {
            background: #fff;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 380px;
            width: 100%;
        }
        
        .password-box h3 {
            margin-bottom: 20px;
            color: #1a1a1a;
            font-weight: 600;
        }
        
        .password-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }
        
        .password-box input:focus {
            border-color: #1a1a1a;
        }
        
        .password-box button {
            width: 100%;
            padding: 12px 32px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .password-box .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 12px;
        }
        
        .password-box .hint {
            color: #888;
            font-size: 12px;
            margin-top: 12px;
        }
        
        .config-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: left;
        }
        
        .config-section label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        
        .config-section .small-btn {
            padding: 10px;
            font-size: 13px;
            background: #f5f5f5;
            color: #666;
        }
        
        /* 复制用的隐藏文本框 */
        #copyHelper {
            position: fixed;
            left: -9999px;
            top: 0;
            width: 100px;
            height: 30px;
        }

<body style="user-select: text !important;">
    <textarea id="copyHelper" style="user-select: text !important;"></textarea>
    
    <div class="container" style="user-select: text !important;">
        <div class="header" style="user-select: text !important;">
            <h1 class="title" id="pageTitle" style="user-select: text !important;">我们赢了</h1>
            <p class="subtitle" style="user-select: text !important;">勾选需要的内容，一键复制</p>
            <div class="sync-status hidden" id="syncStatus" style="user-select: text !important;">
                <span class="sync-dot" id="syncDot" style="user-select: text !important;"></span>
                <span id="syncText" style="user-select: text !important;"></span>
            </div>
        </div>
        
        <div class="page-selector hidden" id="pageSelector" style="user-select: text !important;"></div>
        
        <div class="paragraph-list" id="paragraphList" style="user-select: text !important;">
                    <div class="paragraph-item" id="item_0" onclick="toggleCheck(0)" style="user-select: text !important;">
                        <div class="checkbox-wrapper" style="user-select: text !important;">
                            <input type="checkbox" id="check_0" onclick="event.stopPropagation()" style="user-select: text !important;">
                        </div>
                        <div class="paragraph-content" style="user-select: text !important;">这是第一段示例文案，您可以勾选后点击复制按钮进行复制。</div>
                    </div>
                
                    <div class="paragraph-item" id="item_1" onclick="toggleCheck(1)" style="user-select: text !important;">
                        <div class="checkbox-wrapper" style="user-select: text !important;">
                            <input type="checkbox" id="check_1" onclick="event.stopPropagation()" style="user-select: text !important;">
                        </div>
                        <div class="paragraph-content" style="user-select: text !important;">这是第二段示例文案。在编辑模式下，您可以修改、删除或添加新的段落。</div>
                    </div>
                
                    <div class="paragraph-item" id="item_2" onclick="toggleCheck(2)" style="user-select: text !important;">
                        <div class="checkbox-wrapper" style="user-select: text !important;">
                            <input type="checkbox" id="check_2" onclick="event.stopPropagation()" style="user-select: text !important;">
                        </div>
                        <div class="paragraph-content" style="user-select: text !important;">这是第三段示例文案。分享给别人时，对方只能查看和选择复制，无法编辑内容。</div>
                    </div>
                
                    <div class="paragraph-item" id="item_3" onclick="toggleCheck(3)" style="user-select: text !important;">
                        <div class="checkbox-wrapper" style="user-select: text !important;">
                            <input type="checkbox" id="check_3" onclick="event.stopPropagation()" style="user-select: text !important;">
                        </div>
                        <div class="paragraph-content" style="user-select: text !important;">这是第四段示例文案。您可以创建多个不同的页面，每个页面有不同的文案内容。</div>
                    </div>
                </div>
        
        <div class="select-actions" id="selectActions" style="user-select: text !important;">
            <button onclick="selectAll()" style="user-select: text !important;">全选</button>
            <button onclick="deselectAll()" style="user-select: text !important;">全不选</button>
        </div>
        
        <div class="action-area" style="user-select: text !important;">
            <button class="copy-btn" id="copyBtn" style="user-select: text !important;">复制选中内容</button>
            <button class="add-btn hidden" id="addBtn" style="user-select: text !important;">+ 添加新段落</button>
        </div>
        
        <div class="share-section hidden" id="shareSection" style="user-select: text !important;">
            <div class="share-label" style="user-select: text !important;">分享链接（只读模式）</div>
            <div class="share-link" style="user-select: text !important;">
                <input type="text" id="shareLink" readonly="" style="user-select: text !important;">
                <button onclick="copyShareLink()" style="user-select: text !important;">复制链接</button>
            </div>
        </div>
    </div>
    
    <!-- 底部固定栏 -->
    <div class="footer-section" style="user-select: text !important;">
        <div class="footer-content" style="user-select: text !important;">
            <button class="edit-toggle-footer" id="editToggle" style="user-select: text !important;">编辑模式</button>
        </div>
    </div>
    
    <div class="toast" id="toast" style="user-select: text !important;"></div>
    
    <div class="password-overlay hidden" id="passwordOverlay" style="user-select: text !important;">
        <div class="password-box" style="user-select: text !important;">
            <h3 style="user-select: text !important;">输入编辑密码</h3>
            <input type="password" id="passwordInput" placeholder="请输入密码" style="user-select: text !important;">
            <button id="passwordSubmit" style="user-select: text !important;">确认</button>
            <div class="error hidden" id="passwordError" style="user-select: text !important;">密码错误，请重试</div>
            
            <div class="config-section" id="configSection" style="user-select: text !important;">
                <label style="user-select: text !important;">云端同步（JSONbin.io）</label>
                <input type="text" id="apiKeyInput" placeholder="API Key（可选）" style="user-select: text !important;">
                <input type="text" id="binIdInput" placeholder="Bin ID（可选）" style="user-select: text !important;">
                <button class="small-btn" id="saveConfigBtn" style="user-select: text !important;">启用云端同步</button>
                <div class="hint" style="margin-top: 8px; user-select: text !important;">
                    <a href="https://jsonbin.io/" target="_blank" style="color: rgb(102, 102, 102); --darkreader-inline-color: var(--darkreader-text-666666, #b0a89c); user-select: text !important;" data-darkreader-inline-color="">免费注册 JSONbin.io</a> 获取 API Key
                </div>
            </div>
        </div>
    </div>

    <script style="user-select: text !important;">
        const EDIT_PASSWORD = '1592';
        const STORAGE_KEY = 'selectiveCopy_cloud_v2';
        
        let data = {
            title: '我们赢了',
            pages: {
                'default': {
                    title: '我们赢了',
                    paragraphs: [
                        '这是第一段示例文案，您可以勾选后点击复制按钮进行复制。',
                        '这是第二段示例文案。在编辑模式下，您可以修改、删除或添加新的段落。',
                        '这是第三段示例文案。分享给别人时，对方只能查看和选择复制，无法编辑内容。',
                        '这是第四段示例文案。您可以创建多个不同的页面，每个页面有不同的文案内容。'
                    ]
                }
            }
        };
        let currentPage = 'default';
        let isEditMode = false;
        let editingPageTitle = null;
        let cloudConfig = { apiKey: '', binId: '' };
        let syncTimeout = null;
        let isSyncing = false;
        
        function doCopy(text) {
            const helper = document.getElementById('copyHelper');
            helper.value = text;
            helper.style.position = 'fixed';
            helper.style.left = '0';
            helper.style.top = '0';
            helper.style.opacity = '0';
            document.body.appendChild(helper);
            helper.focus();
            helper.select();
            let success = false;
            try { success = document.execCommand('copy'); } catch (e) {}
            helper.style.left = '-9999px';
            return success;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        function updateSyncStatus(status, text) {
            const dot = document.getElementById('syncDot');
            const textEl = document.getElementById('syncText');
            const statusEl = document.getElementById('syncStatus');
            
            if (text) {
                statusEl.classList.remove('hidden');
                dot.className = 'sync-dot';
                if (status) dot.classList.add(status);
                textEl.textContent = text;
            } else {
                statusEl.classList.add('hidden');
            }
        }
        
        async function syncToCloud() {
            if (!cloudConfig.apiKey || isSyncing) return;
            isSyncing = true;
            updateSyncStatus('syncing', '同步中...');
            
            try {
                const url = cloudConfig.binId 
                    ? `https://api.jsonbin.io/v3/b/${cloudConfig.binId}`
                    : 'https://api.jsonbin.io/v3/b';
                
                const response = await fetch(url, {
                    method: cloudConfig.binId ? 'PUT' : 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': cloudConfig.apiKey
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                if (response.ok) {
                    if (!cloudConfig.binId && result.metadata) {
                        cloudConfig.binId = result.metadata.id;
                        saveConfig();
                    }
                    updateSyncStatus('synced', '已同步');
                    saveLocal();
                } else {
                    throw new Error(result.message);
                }
            } catch (e) {
                updateSyncStatus('error', '同步失败');
            }
            isSyncing = false;
        }
        
        async function loadFromCloud() {
            if (!cloudConfig.apiKey || !cloudConfig.binId) return false;
            
            updateSyncStatus('syncing', '加载中...');
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${cloudConfig.binId}/latest`, {
                    headers: { 'X-Master-Key': cloudConfig.apiKey }
                });
                const result = await response.json();
                if (response.ok && result.record) {
                    data = result.record;
                    updateSyncStatus('synced', '已加载');
                    return true;
                }
            } catch (e) {
                updateSyncStatus('error', '加载失败');
            }
            return false;
        }
        
        function saveConfig() {
            localStorage.setItem(STORAGE_KEY + '_config', JSON.stringify(cloudConfig));
        }
        
        function loadConfig() {
            const saved = localStorage.getItem(STORAGE_KEY + '_config');
            if (saved) cloudConfig = JSON.parse(saved);
        }
        
        function saveLocal() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function loadLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { data = JSON.parse(saved); } catch (e) {}
            }
        }
        
        function scheduleSync() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(syncToCloud, 1000);
        }
        
        function saveData() {
            saveLocal();
            if (cloudConfig.apiKey) scheduleSync();
        }
        
        async function init() {
            loadConfig();
            loadLocal();
            
            const urlParams = new URLSearchParams(window.location.search);
            const binIdFromUrl = urlParams.get('id');
            if (binIdFromUrl && !cloudConfig.binId) {
                cloudConfig.binId = binIdFromUrl;
                saveConfig();
            }
            
            if (cloudConfig.apiKey && cloudConfig.binId) {
                await loadFromCloud();
            }
            
            if (urlParams.has('edit')) {
                document.getElementById('passwordOverlay').classList.remove('hidden');
            }
            
            bindEvents();
            renderAll();
        }
        
        function bindEvents() {
            document.getElementById('editToggle').addEventListener('click', toggleEditMode);
            document.getElementById('copyBtn').addEventListener('click', copySelected);
            document.getElementById('addBtn').addEventListener('click', addParagraph);
            document.getElementById('passwordSubmit').addEventListener('click', checkPassword);
            document.getElementById('passwordInput').addEventListener('keypress', e => {
                if (e.key === 'Enter') checkPassword();
            });
            document.getElementById('saveConfigBtn').addEventListener('click', saveCloudConfig);
        }
        
        async function saveCloudConfig() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const binId = document.getElementById('binIdInput').value.trim();
            
            if (!apiKey) {
                showToast('请输入 API Key');
                return;
            }
            
            cloudConfig.apiKey = apiKey;
            if (binId) cloudConfig.binId = binId;
            saveConfig();
            
            showToast('配置已保存');
            await syncToCloud();
        }
        
        function renderAll() {
            renderPageSelector();
            renderParagraphs();
            updateUI();
        }
        
        function renderPageSelector() {
            const selector = document.getElementById('pageSelector');
            if (!isEditMode && Object.keys(data.pages).length <= 1) {
                selector.classList.add('hidden');
                return;
            }
            
            selector.classList.remove('hidden');
            
            let html = '';
            for (const [id, page] of Object.entries(data.pages)) {
                const isActive = id === currentPage;
                const title = page.title || '未命名';
                
                if (editingPageTitle === id) {
                    html += `<button class="page-tab ${isActive ? 'active' : ''}">
                        <input type="text" class="page-title-input" value="${title}" 
                            onclick="event.stopPropagation()" 
                            onblur="savePageTitle('${id}', this.value)" 
                            onkeypress="if(event.key==='Enter'){savePageTitle('${id}', this.value);event.preventDefault()}">
                    </button>`;
                } else {
                    html += `<button class="page-tab ${isActive ? 'active' : ''}" onclick="switchPage('${id}')">
                        <span ondblclick="event.stopPropagation();startEditPageTitle('${id}')">${title}</span>
                        ${isEditMode && Object.keys(data.pages).length > 1 ? `<span class="delete-page" onclick="event.stopPropagation();deletePage('${id}')">×</span>` : ''}
                    </button>`;
                }
            }
            
            if (isEditMode) {
                html += `<button class="new-page-btn" onclick="createNewPage()">+ 新页面</button>`;
            }
            
            selector.innerHTML = html;
        }
        
        function switchPage(pageId) {
            currentPage = pageId;
            renderAll();
        }
        
        function startEditPageTitle(pageId) {
            if (!isEditMode) return;
            editingPageTitle = pageId;
            renderPageSelector();
        }
        
        function savePageTitle(pageId, newTitle) {
            data.pages[pageId].title = newTitle || '未命名';
            editingPageTitle = null;
            saveData();
            renderPageSelector();
            document.getElementById('pageTitle').textContent = data.pages[currentPage].title;
        }
        
        function createNewPage() {
            const id = 'page_' + Date.now();
            data.pages[id] = {
                title: '新页面',
                paragraphs: ['请输入您的文案内容...']
            };
            currentPage = id;
            saveData();
            renderAll();
            editingPageTitle = id;
            renderPageSelector();
        }
        
        function deletePage(pageId) {
            if (!confirm('确定删除这个页面吗？')) return;
            delete data.pages[pageId];
            if (currentPage === pageId) {
                currentPage = Object.keys(data.pages)[0];
            }
            saveData();
            renderAll();
        }
        
        function renderParagraphs() {
            const list = document.getElementById('paragraphList');
            const page = data.pages[currentPage];
            
            if (!page) {
                list.innerHTML = '<p style="color:#999;text-align:center;padding:40px;">页面不存在</p>';
                return;
            }
            
            document.getElementById('pageTitle').textContent = page.title;
            
            if (page.paragraphs.length === 0) {
                list.innerHTML = '<p style="color:#999;text-align:center;padding:40px;">暂无内容</p>';
                return;
            }
            
            let html = '';
            page.paragraphs.forEach((text, index) => {
                html += `
                    <div class="paragraph-item" id="item_${index}" onclick="toggleCheck(${index})">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="check_${index}" ${isEditMode ? 'disabled' : ''} onclick="event.stopPropagation()">
                        </div>
                        ${isEditMode 
                            ? `<textarea class="paragraph-textarea" onclick="event.stopPropagation()" onchange="updateParagraph(${index}, this.value)">${text}</textarea>
                               <button class="delete-btn" onclick="event.stopPropagation();deleteParagraph(${index})">删除</button>`
                            : `<div class="paragraph-content">${text}</div>`
                        }
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
        
        function selectAll() {
            if (isEditMode) return;
            const page = data.pages[currentPage];
            page.paragraphs.forEach((text, index) => {
                const checkbox = document.getElementById('check_' + index);
                const item = document.getElementById('item_' + index);
                if (checkbox) {
                    checkbox.checked = true;
                    item.classList.add('selected');
                }
            });
        }
        
        function deselectAll() {
            if (isEditMode) return;
            const page = data.pages[currentPage];
            page.paragraphs.forEach((text, index) => {
                const checkbox = document.getElementById('check_' + index);
                const item = document.getElementById('item_' + index);
                if (checkbox) {
                    checkbox.checked = false;
                    item.classList.remove('selected');
                }
            });
        }
        
        function toggleCheck(index) {
            if (isEditMode) return;
            const checkbox = document.getElementById('check_' + index);
            const item = document.getElementById('item_' + index);
            checkbox.checked = !checkbox.checked;
            item.classList.toggle('selected', checkbox.checked);
        }
        
        function updateUI() {
            const editToggle = document.getElementById('editToggle');
            const addBtn = document.getElementById('addBtn');
            const shareSection = document.getElementById('shareSection');
            const selectActions = document.getElementById('selectActions');
            
            editToggle.textContent = isEditMode ? '退出编辑' : '编辑模式';
            editToggle.classList.toggle('active', isEditMode);
            
            if (isEditMode) {
                addBtn.classList.remove('hidden');
                shareSection.classList.remove('hidden');
                selectActions.classList.add('hidden');
                updateShareLink();
            } else {
                addBtn.classList.add('hidden');
                shareSection.classList.add('hidden');
                selectActions.classList.remove('hidden');
            }
        }
        
        function toggleEditMode() {
            if (!isEditMode) {
                document.getElementById('passwordOverlay').classList.remove('hidden');
                document.getElementById('passwordInput').focus();
                document.getElementById('apiKeyInput').value = cloudConfig.apiKey || '';
                document.getElementById('binIdInput').value = cloudConfig.binId || '';
            } else {
                isEditMode = false;
                saveData();
                renderAll();
            }
        }
        
        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('passwordError');
            
            if (input.value === EDIT_PASSWORD) {
                isEditMode = true;
                document.getElementById('passwordOverlay').classList.add('hidden');
                input.value = '';
                error.classList.add('hidden');
                
                const url = new URL(window.location);
                url.searchParams.delete('edit');
                window.history.replaceState({}, '', url);
                
                renderAll();
            } else {
                error.classList.remove('hidden');
                input.value = '';
                input.focus();
            }
        }
        
        function addParagraph() {
            data.pages[currentPage].paragraphs.push('新段落内容...');
            saveData();
            renderParagraphs();
            
            setTimeout(() => {
                const textareas = document.querySelectorAll('.paragraph-textarea');
                if (textareas.length > 0) {
                    const last = textareas[textareas.length - 1];
                    last.focus();
                    last.select();
                }
            }, 50);
        }
        
        function updateParagraph(index, text) {
            data.pages[currentPage].paragraphs[index] = text;
            saveData();
        }
        
        function deleteParagraph(index) {
            if (!confirm('确定删除这个段落吗？')) return;
            data.pages[currentPage].paragraphs.splice(index, 1);
            saveData();
            renderParagraphs();
        }
        
        function copySelected() {
            const page = data.pages[currentPage];
            const selected = [];
            
            page.paragraphs.forEach((text, index) => {
                const checkbox = document.getElementById('check_' + index);
                if (checkbox && checkbox.checked) {
                    selected.push(text);
                }
            });
            
            if (selected.length === 0) {
                showToast('请先勾选要复制的内容');
                return;
            }
            
            const text = selected.join('\n\n');
            const success = doCopy(text);
            
            if (success) {
                showToast('已复制 ' + selected.length + ' 段内容');
                const btn = document.getElementById('copyBtn');
                btn.classList.add('success');
                setTimeout(() => btn.classList.remove('success'), 1500);
            } else {
                showToast('复制失败，请手动复制');
            }
        }
        
        function updateShareLink() {
            const url = new URL(window.location);
            url.searchParams.delete('edit');
            url.searchParams.delete('id');
            if (cloudConfig.binId) {
                url.searchParams.set('id', cloudConfig.binId);
            }
            document.getElementById('shareLink').value = url.toString();
        }
        
        function copyShareLink() {
            updateShareLink();
            const link = document.getElementById('shareLink').value;
            if (doCopy(link)) {
                showToast('链接已复制');
            } else {
                showToast('复制失败');
            }
        }
        
        init();
    </script>


</body></html>
